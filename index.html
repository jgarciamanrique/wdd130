<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | Personal Homepage</title>

    <!-- Info -->
    <meta name="description" content="Jairo Garcia - WDD130 personal homepage for practice and learning.">
    <meta name="author" content="Jairo Garcia">

    <!-- Link to CSS -->
    <link rel="stylesheet" href="styles/styles.css">

<body>
